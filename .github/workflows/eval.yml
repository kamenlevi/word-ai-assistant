name: Eval & Improve

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create .env
        run: |
          echo "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" > .env
          echo "BRAVE_KEY=${{ secrets.BRAVE_KEY }}" >> .env

      - name: Run eval
        run: npm run eval

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > eval/last-run.txt
          git add server.js eval/improvements.txt eval/progress.json eval/generated-cases.json eval/RESULTS.md eval/last-run.txt
          git diff --staged --quiet || git commit -m "eval: $(date -u +%Y-%m-%d) — auto-improvement run"
          git push
